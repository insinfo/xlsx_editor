<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLSX Editor — demo de embutimento</title>
    <script defer src="main.dart.js"></script>
    <style>
        /* Estilos apenas da página de demonstração — o tema do editor é
           auto-injetado pelo XlsxEditorWidget (packages/xlsx_editor/assets). */
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #eef1f5;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            font-size: 13px;
            color: #26364d;
        }

        .demo-shell {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
            padding: 14px;
        }

        .demo-settings {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 0 0 auto;
        }

        .demo-settings label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .demo-settings select {
            height: 26px;
            border: 1px solid #bcc5d2;
            border-radius: 3px;
            background: #fff;
            font: inherit;
            font-size: 12px;
        }

        #editor-host { flex: 1 1 auto; min-height: 0; display: flex; }
        #editor-host > .xe-embed { height: 100% !important; }

        .demo-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #687386;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="demo-shell">
        <div class="demo-settings">
            <strong>XLSX Editor</strong>
            <label>Aparência
                <select id="demo-appearance">
                    <option value="excel" selected>Excel</option>
                    <option value="compact">Compacto</option>
                </select>
            </label>
            <label>Modo
                <select id="demo-mode">
                    <option value="editor" selected>Edição</option>
                    <option value="viewer">Visualizador</option>
                </select>
            </label>
        </div>
        <div id="editor-host">
            <div id="loading" class="demo-loading">Carregando planilha…</div>
        </div>
    </div>
</body>
</html>
